apiVersion: v1
kind: Secret
metadata:
  name: stellar-pay-secrets
  namespace: stellar-pay
type: Opaque
stringData:
  JWT_SECRET: replace-me-with-a-real-jwt-secret
  DATABASE_URL: postgresql://postgres:postgres@postgresql.stellar-pay.svc.cluster.local:5432/stellar_pay
  REDIS_URL: redis://redis.stellar-pay.svc.cluster.local:6379
  TREASURY_WALLET_ADDRESS: GDTREASURYADDRESSXXXXXX
  NEXTAUTH_SECRET: replace-me-with-a-real-nextauth-secret
