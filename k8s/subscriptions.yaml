apiVersion: apps/v1
kind: Deployment
metadata:
  name: subscriptions
  namespace: stellar-pay
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: subscriptions
  template:
    metadata:
      labels:
        app.kubernetes.io/name: subscriptions
    spec:
      containers:
        - name: subscriptions
          image: ghcr.io/missblue00/stellar-pay-subscriptions:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 3004
          envFrom:
            - configMapRef:
                name: stellar-pay-config
            - secretRef:
                name: stellar-pay-secrets
          env:
            - name: PORT
              value: '3004'
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 20
            periodSeconds: 15
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: subscriptions
  namespace: stellar-pay
spec:
  selector:
    app.kubernetes.io/name: subscriptions
  ports:
    - name: http
      port: 80
      targetPort: http
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: subscriptions
  namespace: stellar-pay
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: subscriptions
  minReplicas: 2
  maxReplicas: 5
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 75
